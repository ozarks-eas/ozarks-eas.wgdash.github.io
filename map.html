    }

      color: #aaa;
    }
    .timestamp {
      font-size: 0.8em;
      color: #ccc;
      margin-top: 0.5em;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal img, .modal video {
      max-width: 95%;
      max-height: 95%;
      border-radius: 8px;
    }
      @keyframes pulse {
      0% { stroke-width: 2px; }
      50% { stroke-width: 6px; }
      100% { stroke-width: 2px; }
    }
    .emergency {
      animation: pulse 1.5s infinite;
      stroke: #ff69b4 !important;
    }

async function fetchWarnings() {
  try {
    const response = await fetch("https://api.weather.gov/alerts/active");
    const data = await response.json();

    const now = new Date();
    const uniqueWarnings = {};

    const validWarnings = data.features.filter((warning) => {
      const expires = new Date(warning.properties.expires);
      const id = warning.id;
      if (expires > now && !uniqueWarnings[id]) {
        uniqueWarnings[id] = true;
        return true;
      }
      return false;
    });

    const emergencyWarnings = [];
    const destructiveWarnings = [];
    const regularWarnings = [];

    validWarnings.forEach((warning) => {
      const desc = warning.properties.description || "";
      if (desc.includes("FLASH FLOOD EMERGENCY") || desc.includes("TORNADO EMERGENCY")) {
        emergencyWarnings.push(warning);
      } else if (desc.includes("DESTRUCTIVE STORMS") || desc.includes("DESTRUCTIVE STORM")) {
        destructiveWarnings.push(warning);
      } else {
        regularWarnings.push(warning);
      }
    });

    const sortedWarnings = [
      ...regularWarnings.sort(
        (a, b) => new Date(a.properties.sent) - new Date(b.properties.sent)
      ),
      ...destructiveWarnings,
      ...emergencyWarnings,
    ];

    if (!usCountyGeoJson) {
      console.warn("County geojson not ready yet.");
      return;
    }

    displayWarningsOnMap(sortedWarnings, emergencyWarnings, destructiveWarnings);
  } catch (error) {
    console.error("Error fetching warnings:", error);
  }
}

function displayWarningsOnMap(warnings, emergencyWarnings, destructiveWarnings) {
  warningPolygons.forEach(p => map.removeLayer(p));
  warningPolygons = [];

  if (!map.getPane("fallbackPolygons")) {
    map.createPane("fallbackPolygons");
    map.getPane("fallbackPolygons").style.zIndex = 300;
  }

  warnings.forEach((warning) => {
    const expires = new Date(warning.properties.expires);
    const fipsCodes = (warning.properties.geocode?.SAME || []).map(c =>
      c.padStart(5, "0").slice(-5)
    );

    function getTimeRemaining() {
      const now = new Date();
      const timeLeft = expires - now;
      if (timeLeft <= 0) return "Expired";
      const minutes = Math.floor((timeLeft / 1000 / 60) % 60);
      const hours = Math.floor(timeLeft / 1000 / 60 / 60);
      return `${hours}h ${minutes}m`;
    }

    if (warning.geometry?.type === "Polygon") {
      const coordinates = warning.geometry.coordinates[0].map(coord => [
        coord[1],
        coord[0],
      ]);

      let color = warningColors[warning.properties.event] || warningColors.Default;
      let weight = 4;
      let className = "";

      if (emergencyWarnings.includes(warning)) {
        color = "#FF69B4";
        weight = 6;
        className = "emergency";
      } else if (destructiveWarnings.includes(warning)) {
        color = "#AB7800";
        weight = 6;
        className = "destructive";
      }

      const polygon = L.polygon(coordinates, {
        color,
        weight,
        opacity: 1,
        fillOpacity: 0.45,
        className
      }).bindPopup(`
        <strong>Event:</strong> ${warning.properties.event}<br>
        <strong>Sender:</strong> ${warning.properties.senderName || "N/A"}<br>
        <strong>Area(s):</strong> ${warning.properties.areaDesc || "N/A"}<br>
        <strong>Sent:</strong> ${new Date(warning.properties.sent).toLocaleString()}<br>
        <strong>Expires:</strong> ${expires.toLocaleString()}<br>
        <strong>Time Remaining:</strong> ${getTimeRemaining()}<br>
      `);

      // attach warning metadata
      polygon._warningId = warning.id;
      polygon._warningObj = warning;
      polygon.on('click', function(e) {
        filterCamerasByWarning(this._warningId);
      });

      polygon.addTo(map);
      if (className) polygon.bringToFront();
      warningPolygons.push(polygon);

    } else if (fipsCodes.length && usCountyGeoJson) {
      const fallbackColor = warningColors[warning.properties.event] || "#999";

      usCountyGeoJson.features.forEach(feature => {
        if (fipsCodes.includes(feature.id)) {
          const geom = feature.geometry;
          const polys = geom.type === "Polygon" ? [geom.coordinates] : geom.coordinates;

          polys.forEach(p => {
            const latlngs = p[0].map(coord => [coord[1], coord[0]]);
            const polygon = L.polygon(latlngs, {
              color: fallbackColor,
              weight: 3.5,
              opacity: 0.75,
              fillOpacity: 0.1,
              pane: "fallbackPolygons"
            }).bindPopup(`
              <strong>Event:</strong> ${warning.properties.event}<br>
              <strong>Sender:</strong> ${warning.properties.senderName || "N/A"}<br>
              <strong>Area(s):</strong> ${warning.properties.areaDesc || "N/A"}<br>
              <strong>Sent:</strong> ${new Date(warning.properties.sent).toLocaleString()}<br>
              <strong>Expires:</strong> ${expires.toLocaleString()}<br>
            `);

            // attach fallback polygon metadata and click handler (must be inside the loop)
            polygon._warningId = warning.id;
            polygon._warningObj = warning;
            polygon.on('click', function(e) {
              filterCamerasByWarning(this._warningId);
            });

            polygon.addTo(map);
            warningPolygons.push(polygon);
          });

        }
      });
    }
  });

  // ensure camera badges are recalculated after warnings are drawn
  mapWarningsToCameras();
}

let lastUpdateTime = null;

async function conditionalRefreshRadarLayer() {
  const response = await fetch(
    "https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi?"
  );
  const currentUpdateTime = response.headers.get("Last-Modified");

  if (currentUpdateTime && currentUpdateTime !== lastUpdateTime) {
    lastUpdateTime = currentUpdateTime;
    refreshRadarLayer();
  }
}

const PROXY_BASE = '';
let showOnlyVisible = false;
let cameras = [];
let lastUpdated = new Date();

fetch('cameras.json')
  .then(res => res.json())
  .then(data => {
    cameras = data.filter(cam => {
    return !('_comment' in cam) && cam.id && cam.coords && cam.coords.length === 2;
  });
  
    console.log('Loaded cameras:', cameras.length);

    cameras.forEach(cam => {
      if (!cam.coords || cam.coords.length !== 2) return;

      const marker = L.marker(cam.coords, { icon: cameraIcon });
      marker._camId = cam.id;
      const src = cam.src || getImageUrl(cam.id);

      const popupContent =
        cam.type === 'image'
          ? `<strong>${cam.name}</strong><br><img src="${src}" width="300">`
          : cam.type === 'iframe'
            ? `<strong>${cam.name}</strong><br><iframe src="${cam.src}" width="300" height="200" frameborder="0" allowfullscreen></iframe>`
            : `<strong>${cam.name}</strong><br><video id="popup-vid-${cam.id}" width="300" controls muted playsinline></video>`;

      marker.bindPopup(popupContent);
      markerCluster.addLayer(marker);
      // Attach HLS into popup when it opens; don't autoplay
      marker.on('popupopen', function(){
        setTimeout(() => {
          const vid = document.getElementById(`popup-vid-${cam.id}`);
          if(!vid) return;
          const key = `popup-${cam.id}`;
          try{ if(_hlsInstances[key]){ _hlsInstances[key].destroy(); delete _hlsInstances[key]; } }catch(e){}
          const stream = (cam.src || getImageUrl(cam.id) || '').toString();
          if(stream.toLowerCase().includes('.m3u8')){
            if(window.Hls && Hls.isSupported()){
              const h = new Hls();
              h.loadSource(stream);
              h.attachMedia(vid);
              _hlsInstances[key] = h;
              // do not call play() to respect disabled autoplay
            } else if(vid.canPlayType && vid.canPlayType('application/vnd.apple.mpegurl')){

function buildCameraBox(cam) {
  const box = document.createElement('div');
  box.className = 'camera-box';
  box.setAttribute('data-state', cam.state);
  box.setAttribute('data-route', cam.route);
  let media, src;

  if (cam.type === 'image') {
    src = cam.src || getImageUrl(cam.id);
    media = `<img id="img-${cam.id}" src="${src}" alt="${cam.name}" onclick="showModal(this.src)">`;
  } else if (cam.type === 'iframe') {
    src = cam.proxy ? PROXY_BASE + encodeURIComponent(cam.rawSrc) : cam.src;
    media = `<iframe src="${src}" width="100%" height="200" frameborder="0" allowfullscreen></iframe>`;
    } else {
    src = cam.proxy ? PROXY_BASE + encodeURIComponent(cam.rawSrc) : cam.src;
    // detect HLS by .m3u8 in src
    const isHls = src && src.toString().toLowerCase().includes('.m3u8');
    // disable autoplay and loop; user must press play
    media = `<video id="vid-${cam.id}" controls muted playsinline style="width:100%;"></video>`;
    // attach source after element is created below
  }

  box.innerHTML = `
    <div class="camera-name">${cam.name}</div>
    <div class="coords">${cam.coords.map(c => c.toFixed(5)).join(', ')}</div>
    ${media}
    <div class="timestamp" id="ts-${cam.id}">Updated: ${lastUpdated.toLocaleTimeString()}</div>
    <div class="camera-warnings" id="warnings-${cam.id}" style="margin:0.5em 0"></div>
  `;

  // If a video element was created, attach HLS if needed (using box-scoped query so element found before DOM insert)
  if (!cam.type || cam.type !== 'image' && cam.type !== 'iframe'){
    const v = box.querySelector(`#vid-${cam.id}`);
      if(v){
      // cleanup any existing instance
      try{ if(_hlsInstances[cam.id]){ _hlsInstances[cam.id].destroy(); delete _hlsInstances[cam.id]; } }catch(e){}
      if(src && src.toString().toLowerCase().includes('.m3u8')){
        try{
          if(window.Hls && Hls.isSupported()){
            const h = new Hls();
            h.loadSource(src);
            h.attachMedia(v);
            _hlsInstances[cam.id] = h;
            // do not autoplay; user must press play
          } else if(v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')){
            v.src = src;
          } else {
            // cannot play HLS, leave poster blank
          }
        }catch(e){ console.warn('attach hls', e); }
      } else {
        // non-HLS video
        try{ v.src = src; }catch(e){}
      }
      v.addEventListener('click', function(ev){ ev.stopPropagation(); showModalVideo(src); });
    }
  }

  return box;
}

// Simple ray-casting point-in-polygon test for lat/lng arrays
function pointInPolygon(point, vs) {
  // point: [lat, lng]
  const x = point[1], y = point[0];
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    const xi = vs[i][1], yi = vs[i][0];
    const xj = vs[j][1], yj = vs[j][0];

    const intersect = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi + 0.0) + xi);
    if (intersect) inside = !inside;
  }

  return inside;
}

function mapWarningsToCameras() {
  warningToCameraIds = {};
  cameraIdToWarnings = {};
  // initialize
  cameras.forEach(cam => {
    cameraIdToWarnings[cam.id] = [];
  });

  warningPolygons.forEach(p => {
    const wid = p._warningId || (p._warningObj && p._warningObj.id) || JSON.stringify(p._latlngs || p.getLatLngs());
    warningToCameraIds[wid] = [];
    const latlngs = p.getLatLngs ? p.getLatLngs() : [];
    // normalize to array of [lat,lng]
    const ring = (latlngs && latlngs[0]) ? latlngs[0].map(ll => [ll.lat, ll.lng]) : [];

    cameras.forEach(cam => {
      if (!cam.coords || cam.coords.length !== 2) return;
      if (ring.length && pointInPolygon(cam.coords, ring)) {
        warningToCameraIds[wid].push(cam.id);
        cameraIdToWarnings[cam.id].push(p._warningObj || {});
      }
    });
  });

  // Update any existing camera boxes with warning badges
  cameras.forEach(cam => {
    const container = document.getElementById(`warnings-${cam.id}`);
    if (!container) return;
    container.innerHTML = '';
    const warns = cameraIdToWarnings[cam.id] || [];
    warns.forEach(w => {
      const btn = document.createElement('button');
      btn.textContent = w.properties ? w.properties.event : (w.event || 'Warning');
      btn.style.background = warningColors[w.properties?.event] || '#666';
      btn.style.color = '#000';
      btn.style.border = 'none';
      btn.style.padding = '0.2em 0.5em';
      btn.style.marginRight = '0.25em';
      btn.style.borderRadius = '4px';
      btn.style.cursor = 'pointer';
      btn.title = w.properties ? w.properties.headline || w.properties.description || '' : '';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const wid = w.id;
        filterCamerasByWarning(wid);
        // zoom to warning polygon if available
        const poly = warningPolygons.find(pp => (pp._warningId === wid));
        if (poly) map.fitBounds(poly.getBounds());
      });
      container.appendChild(btn);
    });
  });
}

function filterCamerasByWarning(wid) {
  const ids = warningToCameraIds[wid] || [];
  const grid = document.getElementById('cameraGrid');
  grid.innerHTML = '';
  if (ids.length === 0) {
    const msg = document.createElement('div');
    msg.style.color = '#ccc';
    msg.style.padding = '1em';
    msg.textContent = 'No cameras found inside this warning.';
    grid.appendChild(msg);
    return;
  }

  cameras.forEach(cam => {
    if (ids.includes(cam.id)) {
      grid.appendChild(buildCameraBox(cam));
    }
  });
}

// Helper function to convert RGB/hex colors to string
function rgbString(color) {
  if (!color) return null;
  if (typeof color === 'string') return color;
  return null;
}

// Helper to create and style RealEarth GeoJSON layers
function createRealEarthLayer(url, paneName = 'realEarthPane') {
  const layer = L.layerGroup();
  layer._realEarthUrl = url;
  layer._geoJsonLayer = null;

  async function loadData() {
    try {
      const res = await fetch(url);
      const data = await res.json();

      if (layer._geoJsonLayer) {
        layer.removeLayer(layer._geoJsonLayer);
      }

      layer._geoJsonLayer = L.geoJSON(data, {
        pane: paneName, // Use the specified pane
        style: feature => ({
          color: rgbString(feature.properties.BCOLOR) || rgbString(feature.properties.COLOR) || '#00bfff',
          weight: 2,
          opacity: (feature.properties.BOPACITY ?? 100) / 100,
          fillColor: rgbString(feature.properties.COLOR) || rgbString(feature.properties.BCOLOR) || '#00bfff',
          fillOpacity: (feature.properties.OPACITY ?? 50) / 100
        }),
        onEachFeature: (feature, layerObj) => {
          const title = feature.properties.PRODUCT || feature.properties.RE_PRODUCT_NAME || 'Layer';
          const desc = feature.properties.INFO || feature.properties.RE_TOOLTIP || feature.properties.OUTLOOK || '';
          layerObj.bindPopup(
            `<strong>${title}</strong><br>${desc}`
          );
        }
      });
      layer._geoJsonLayer.addTo(layer);
    } catch (e) {
      console.error('Failed to load RealEarth layer:', url, e);
    }
  }

  layer._refresh = loadData;
  loadData();
  return layer;
}

function createSPCDay1Layer(url) {

// Closures Points specific layer with incident icons - clusters with cameras
function createClosuresLayer(url) {
  const layer = L.layerGroup();
  layer._geoJsonUrl = url;
  layer._closureMarkers = []; // Track closure markers for add/remove
  layer._isEnabled = false; // Track if layer is currently enabled

  // Icon for closure/incident points
  const incidentIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/128/15674/15674336.png',
    iconSize: [30, 30],
    iconAnchor: [15, 30],
    popupAnchor: [0, -30],
    shadowUrl: null
  });

  async function loadData() {
    try {
      const res = await fetch(url);
      const data = await res.json();

      // Remove old markers from cluster
      layer._closureMarkers.forEach(marker => {
        markerCluster.removeLayer(marker);
      });
      layer._closureMarkers = [];

      // Process each feature as a marker (but don't add to cluster yet)
      data.features.forEach(feature => {
        if (feature.geometry && feature.geometry.type === 'Point') {
          const latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
          const props = feature.properties;
          
          const marker = L.marker(latlng, {
            icon: incidentIcon
          });

          // Build popup from properties
          let popupContent = `<strong>${props.name || props.title || 'Incident'}</strong>`;
          
          if (props.reason_name) {
            popupContent += `<br><strong>Reason:</strong> ${props.reason_name}`;
          }
          if (props.description) {
            popupContent += `<br><strong>Description:</strong> ${props.description}`;
          }
          if (props.closed_time) {
            popupContent += `<br><strong>Closed Time:</strong> ${props.closed_time}`;
          }
          if (props.travel_direction_name) {
            popupContent += `<br><strong>Direction:</strong> ${props.travel_direction_name}`;
          }
          if (props.lanes && props.lanes["0"]) {
            popupContent += `<br><strong>Lanes Affected:</strong> ${props.lanes["0"]}`;
          }
          if (props.updated_at_time) {
            popupContent += `<br><strong>Updated:</strong> ${props.updated_at_time}`;
          }
          if (props.reported_by) {
            popupContent += `<br><strong>Reported By:</strong> ${props.reported_by}`;
          }
          
          marker.bindPopup(popupContent);
          layer._closureMarkers.push(marker);
        }
      });

      // Only add to cluster if layer is currently enabled
      if (layer._isEnabled) {
        layer._closureMarkers.forEach(marker => {
          markerCluster.addLayer(marker);
        });
        if (typeof markerCluster !== "undefined") {
          markerCluster.bringToFront();
        }
      }
    } catch (e) {
      console.error('Failed to load Closures layer:', url, e);
    }
  }

  layer._refresh = loadData;
  layer._toggle = function(enabled) {
    layer._isEnabled = enabled;
    layer._closureMarkers.forEach(marker => {
      if (enabled) {
        markerCluster.addLayer(marker);
      } else {
        markerCluster.removeLayer(marker);
      }
    });
    if (enabled && typeof markerCluster !== "undefined") {
      markerCluster.bringToFront();
    }
  };
  
  loadData();
  return layer;
}

// Winter Routes specific layer with color mapping
function createWinterRoutesLayer(url) {
  const layer = L.layerGroup();
  layer._geoJsonUrl = url;
  layer._geoJsonLayer = null;

  // Color mapping for road conditions
  const conditionColors = {
    'Clear': '#2ecc71',              
    'Mostly Clear': '#52be80',       
    'Partly Covered': '#f1c40f',     
    'Covered': '#e67e22',            
    'Clearing Suspended': '#e74c3c', 
    'Closed': '#c0392b'              
  };

  const roadContentColors = {
    'Clear': '#2ecc71',              
    'Snow': '#52be80',               
    'Slush': '#e67e22',              
    'Ice Patches': '#e74c3c',        
    'Ice': '#c0392b'                 
  };

  function getRouteColor(feature) {
    const props = feature.properties;
    
    // Use condition property
    const condition = props.condition || '';
    
    // Use precip property for what's on the road
    const precip = props.precip || '';

    // Prioritize precip (what's on the road) over condition
    // This ensures snow/ice displays even if condition is "Clear" or "Mostly Clear"
    if (precip && roadContentColors[precip]) {
      return roadContentColors[precip];
    }
    if (condition && conditionColors[condition]) {
      return conditionColors[condition];
    }
    
    return '#95a5a6'; // Default gray if no match
  }

  async function loadData() {
    try {
      // Fetch both the main and city-level routes
      const [res1, res2] = await Promise.all([
        fetch(url),
        fetch('https://layers.idrivearkansas.com/winter_routes_city.geojson')
      ]);
      const data1 = await res1.json();
      const data2 = await res2.json();

      // Merge features from both sources
      const mergedData = {
        type: 'FeatureCollection',
        features: [
          ...(data1.features || []),
          ...(data2.features || [])
        ]
      };

      if (layer._geoJsonLayer) {
        layer.removeLayer(layer._geoJsonLayer);
      }

      layer._geoJsonLayer = L.geoJSON(mergedData, {
        pane: 'realEarthPane',
        style: feature => {
          const props = feature.properties;
          const condition = props.condition || '';
          const precip = props.precip || '';
          const style = {
            color: getRouteColor(feature),
            weight: 3,
            opacity: 1,
            fillColor: getRouteColor(feature),
            fillOpacity: 1
          };
          
          if (condition === 'Mostly Clear' && precip === 'Snow') {
            style.color = '#7dc740';
            style.fillColor = '#7dc740';
            style.weight = 3;
          }
          
          return style;
        },
        onEachFeature: (feature, layerObj) => {
          const props = feature.properties;
          let popupContent = '';
          
          // Road name - format based on route_type
          let roadName = 'Unknown Route';
          if (props.route_type && props.route) {
            if (props.route_type === 'State') {
              roadName = `AR ${props.route}`;
            } else if (props.route_type === 'US') {
              roadName = `US ${props.route}`;
            } else if (props.route_type === 'Interstate') {
              roadName = `I ${props.route}`;
            } else {
              roadName = `${props.route_type} ${props.route}`;
            }
          }
          popupContent += `<strong>${roadName}</strong><br>`;
          
          // Segment (seg_extern)
          if (props.seg_extern) {
            popupContent += `<strong>Segment:</strong> ${props.seg_extern}<br>`;
          }
          
          // Condition (This route is)
          if (props.condition) {
            popupContent += `<strong>This route is:</strong> ${props.condition}<br>`;
          }
          
          // What's on the road (precip)
          if (props.precip) {
            popupContent += `<strong>What's on the road:</strong> ${props.precip}<br>`;
          }
          
          // Temperature
          if (props.temperature) {
            popupContent += `<strong>Temp:</strong> ${props.temperature}°F<br>`;
          }
          
          // Last Updated
          if (props.lastupdate) {
            // Parse and format the ISO timestamp
            const updateDate = new Date(props.lastupdate);
            const formattedDate = updateDate.toLocaleString();
            popupContent += `<strong>Last Updated:</strong> ${formattedDate}`;
          }
          
          layerObj.bindPopup(popupContent);
        }
      });
      layer._geoJsonLayer.addTo(layer);
    } catch (e) {
      console.error('Failed to load Winter Routes layer:', url, e);
    }
  }

  layer._refresh = loadData;
  loadData();
  return layer;
}

      </div>
      <div style="display: flex; align-items: center; gap: 0.5em;">
        <div style="width: 20px; height: 20px; background-color: #f1c40f; border: 1px solid #999;"></div>
        <span>Partly Covered</span>
      </div>
      <div style="display: flex; align-items: center; gap: 0.5em;">
        <div style="width: 20px; height: 20px; background-color: #7dc740; border: 1px solid #999;"></div>
        <span>Mostly Clear + Snow</span>
      </div>
      <div style="display: flex; align-items: center; gap: 0.5em;">
        <div style="width: 20px; height: 20px; background-color: #52be80; border: 1px solid #999;"></div>
        <span>Mostly Clear / Snow</span>
      </div>
      <div style="display: flex; align-items: center; gap: 0.5em;">
        <div style="width: 20px; height: 20px; background-color: #2ecc71; border: 1px solid #999;"></div>
        <span>Clear</span>
      </div>
    </div>
  `;
  
  return div;
};

// Build layers menu with all layers sorted alphabetically
const allLayers = [
  ...realEarthLayerObjs,
  probSevereLayerObj
];

// Sort alphabetically by name
allLayers.sort((a, b) => a.name.localeCompare(b.name));

const layersMenu = document.getElementById('layersMenu');

// Add all layer toggles
allLayers.forEach((obj, i) => {
  const id = `layerToggle${i}`;
  const label = document.createElement('label');
  label.style.display = 'flex';
  label.style.alignItems = 'center';
  label.style.gap = '0.5em';
  label.style.margin = '0';
  
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.id = id;
  checkbox.style.cursor = 'pointer';
  
  const text = document.createElement('span');
  text.textContent = obj.name;
  
  label.appendChild(checkbox);
  label.appendChild(text);
  layersMenu.appendChild(label);
  
  // Add change event listener
  checkbox.addEventListener('change', function(e) {
    if (obj.layer._toggle) {
      // Use custom toggle for special layers like closures
      obj.layer._toggle(e.target.checked);
    } else if (e.target.checked) {
      obj.layer.addTo(map);
      // Show legend if this is the Road Conditions layer
      if (obj.name === 'Road Conditions') {
        legendControl.addTo(map);
        legendControl.getContainer().style.display = 'block';
      }
    } else {
      map.removeLayer(obj.layer);
      // Hide legend if this is the Road Conditions layer
      if (obj.name === 'Road Conditions' && legendControl && map.hasLayer(legendControl)) {
        map.removeControl(legendControl);
      }
    }
  });
});

// Refresh RealEarth layers every 2 minutes
setInterval(() => {
  realEarthLayerObjs.forEach(obj => {
    obj.layer._refresh();
  });
}, 120000); // 2 minutes

// Refresh ProbSevere every minute
setInterval(() => {
  probSevereLayerObj.layer._refresh();
}, 60000); // 1 minute
</script>
</body>
