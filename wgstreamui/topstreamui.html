<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1609, initial-scale=1.0" />
  <title>Fox Weather Style - Zero Gap Fix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;900&family=Roboto:wght@400;700&display=swap');
    
    body { margin: 0; background: transparent; font-family: 'Roboto', sans-serif; overflow: hidden; }

    .alert-wrapper {
      width: 1609px; height: 80px; display: flex; align-items: center;
      position: relative; margin: 20px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
      opacity: 0; transition: opacity 1s ease;
    }
    .visible { opacity: 1; }

    /* The Badge: Top Layer */
    .event-badge {
      height: 80px; min-width: 400px; display: flex; align-items: center; justify-content: center;
      padding: 0 40px; z-index: 10; 
      /* Clean cut shape - Ensure the bottom right (90% 100%) is precise */
      clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 0% 100%);
      font-family: 'Roboto Condensed', sans-serif; font-weight: 900; font-size: 32px;
      text-transform: uppercase; color: white; position: relative;
      transition: background-color 0.8s ease, color 0.8s ease;
    }

    .event-badge::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 100%);
    }

    /* The Tray: Bottom Layer, Angled to fit the badge overlap */
    .data-tray {
      flex-grow: 1; height: 80px; 
      background: linear-gradient(90deg, #111 0%, #222 100%);
      /* Pull the tray DEEP under the badge to eliminate seams */
      margin-left: -60px; 
      padding-left: 80px; 
      display: flex; flex-direction: column;
      justify-content: center; 
      border-right: 4px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 5;
      /* Mirrored clip-path to ensure the bottom-left corner of the tray 
         doesn't peek out from under the badge angle */
      clip-path: polygon(5% 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .content-fade { transition: opacity 0.4s ease-in-out; }
    .text-hidden { opacity: 0; }

    .location-text {
      font-family: 'Roboto Condensed', sans-serif; font-size: 26px; font-weight: 700;
      color: #fff; text-transform: uppercase; margin-bottom: 2px;
    }

    .details-text { font-size: 16px; font-weight: 400; color: #cbd5e1; letter-spacing: 0.5px; }
    .details-text b { color: #fff; font-family: monospace; }
  </style>
</head>
<body>
  <div class="alert-wrapper" id="banner">
    <div class="event-badge" id="badge">Alert</div>
    <div class="data-tray">
      <div id="textGroup" class="content-fade">
        <div class="location-text" id="location">Monitoring...</div>
        <div class="details-text" id="details">Waiting for Data</div>
      </div>
    </div>
  </div>

  <script>
    const stateMap = { AL: "Alabama", AK: "Alaska", AZ: "Arizona", AR: "Arkansas", CA: "California", CO: "Colorado", CT: "Connecticut", DE: "Delaware", FL: "Florida", GA: "Georgia", HI: "Hawaii", ID: "Idaho", IL: "Illinois", IN: "Indiana", IA: "Iowa", KS: "Kansas", KY: "Kentucky", LA: "Louisiana", ME: "Maine", MD: "Maryland", MA: "Massachusetts", MI: "Michigan", MN: "Minnesota", MS: "Mississippi", MO: "Missouri", MT: "Montana", NE: "Nebraska", NV: "Nevada", NH: "New Hampshire", NJ: "New Jersey", NM: "New Mexico", NY: "New York", NC: "North Carolina", ND: "North Dakota", OH: "Ohio", OK: "Oklahoma", OR: "Oregon", PA: "Pennsylvania", RI: "Rhode Island", SC: "South Carolina", SD: "South Dakota", TN: "Tennessee", TX: "Texas", UT: "Utah", VT: "Vermont", VA: "Virginia", WA: "Washington", WV: "West Virginia", WI: "Wisconsin", WY: "Wyoming" };
    
    const alertConfig = { 
      "Tornado Warning": { bg: "#FF0000", text: "white" }, 
      "Flash Flood Warning": { bg: "#8B0000", text: "white" }, 
      "Severe Thunderstorm Warning": { bg: "#FFA500", text: "black" }, 
      "Tornado Watch": { bg: "#FFFF00", text: "black" }, 
      "Severe Thunderstorm Watch": { bg: "#DB7093", text: "black" },
      "Tornado Emergency": { bg: "#660000", text: "white" }, 
      "Flash Flood Emergency": { bg: "#330000", text: "white" } 
    };

    const hazardTranslations = {
      "60 mph wind gusts": "Winds: 60 MPH", "70 mph wind gusts": "Winds: 70 MPH", "80 mph wind gusts": "Winds: 80 MPH", "90 mph wind gusts": "Winds: 90 MPH", "100 mph wind gusts": "Winds: 100 MPH",
      "penny size hail": "Hail: 0.75 IN", "nickel size hail": "Hail: 0.88 IN", "quarter size hail": "Hail: 1.00 IN", "half dollar size hail": "Hail: 1.25 IN", "ping pong size hail": "Hail: 1.50 IN", "golf ball size hail": "Hail: 1.75 IN", "two inch hail": "Hail: 2.00 IN", "tennis ball size hail": "Hail: 2.50 IN", "baseball size hail": "Hail: 2.75 IN", "three inch hail": "Hail: 3.00 IN", "softball size hail": "Hail: 4.00 IN", "grapefruit size hail": "Hail: 4.50 IN", "dvd size hail": "Hail: 5.00 IN",
      "radar indicated rotation": "Tornado: RADAR INDICATED", "damaging tornado": "Tornado: OBSERVED", "large and extremely dangerous tornado": "Tornado Threat: CONSIDERABLE", "large and destructive tornado": "Tornado Threat: DESTRUCTIVE",
      "flash flooding is ongoing or expected to begin shortly": "Flash Flood: RADAR INDICATED", "flash flooding is already occurring": "Flash Flood: OBSERVED", "life threatening flash flooding": "Flood Threat: CONSIDERABLE", "this is an extremely dangerous and life-threatening situation": "Flood Threat: CATASTROPHIC",
    };

    let activeAlerts = [];
    let cycleIndex = 0;

    async function fetchAlerts() {
      try {
        const res = await fetch("https://api.weather.gov/alerts/active?area=AR,KS,MO,OK,FL");
        const data = await res.json();
        const baseAlerts = data.features.map(f => f.properties).filter(a => alertConfig[a.event]);
        
        // Expand alerts with multiple counties into separate entries in the cycle
        activeAlerts = [];
        baseAlerts.forEach(alert => {
          const counties = alert.areaDesc.split(';').map(s => s.trim()).filter(c => c);
          counties.forEach(county => {
            const alertCopy = { ...alert };
            alertCopy.displayCounty = county;
            activeAlerts.push(alertCopy);
          });
        });
        
        if (activeAlerts.length > 0 && cycleIndex === 0) showNextAlert();
      } catch (e) { console.error(e); }
    }

    function showNextAlert() {
      const textGroup = document.getElementById("textGroup");
      const badge = document.getElementById("badge");
      textGroup.classList.add("text-hidden");

      setTimeout(() => {
        if (activeAlerts.length === 0) return;
        const alert = activeAlerts[cycleIndex % activeAlerts.length];
        
        const desc = alert.description?.toLowerCase() || "";
        const params = alert.parameters || {};
        
        let eventName = alert.event;
        
        // Detect emergency conditions using parameters and description
        if (alert.event === "Tornado Warning") {
          if (desc.includes("catastrophic") || desc.includes("destructive") || 
              desc.includes("extremely dangerous and")) {
            eventName = "Tornado Emergency";
          }
        } else if (alert.event === "Flash Flood Warning") {
          // Check parameters for CATASTROPHIC damage threat (most reliable indicator)
          if (params.flashFloodDamageThreat?.[0] === "CATASTROPHIC" ||
              desc.includes("catastrophic") || desc.includes("extremely dangerous and")) {
            eventName = "Flash Flood Emergency";
          }
        }
        
        const config = alertConfig[eventName];
        
        badge.textContent = eventName;
        badge.style.backgroundColor = config.bg;
        badge.style.color = config.text;

        // Extract state and county from the displayCounty (format: "County, STATE" or just "County")
        let stateAbbr = '';
        const countyParts = alert.displayCounty.split(',').map(s => s.trim());
        const area = countyParts[0];
        
        if (countyParts.length > 1) {
          // State is after comma
          const potentialState = countyParts[countyParts.length - 1].toUpperCase();
          if (potentialState.length === 2 && /^[A-Z]{2}$/.test(potentialState)) {
            stateAbbr = potentialState;
          }
        }
        
        // Fallback to sender name if state not found
        if (!stateAbbr) {
          let sender = alert.senderName.replace("NWS ", "");
          stateAbbr = sender.split(" ").pop();
        }
        
        document.getElementById("location").textContent = `${area}, ${stateAbbr}`;

        // Build hazard text from API parameters (more reliable than parsing description)
        let hazardText = '';
        
        if (params.tornadoDetection?.[0]) {
          hazardText = `Tornado: ${params.tornadoDetection[0]}`;
        }
        if (params.maxWindGust?.[0]) {
          hazardText += (hazardText ? " | " : "") + params.maxWindGust[0];
        } else if (params.windThreat?.[0]) {
          hazardText += (hazardText ? " | " : "") + `Winds: ${params.windThreat[0]}`;
        }
        if (params.maxHailSize?.[0]) {
          hazardText += (hazardText ? " | " : "") + `Hail: ${params.maxHailSize[0]}`;
        } else if (params.hailThreat?.[0]) {
          hazardText += (hazardText ? " | " : "") + `Hail: ${params.hailThreat[0]}`;
        }
        if (params.flashFloodDetection?.[0]) {
          hazardText += (hazardText ? " | " : "") + `Flash Flood: ${params.flashFloodDetection[0]}`;
        }
        
        // Fallback to description parsing if parameters aren't populated
        if (!hazardText) {
          const hazardMatches = Object.keys(hazardTranslations)
            .filter(h => desc.includes(h))
            .map(h => hazardTranslations[h]);
          hazardText = hazardMatches.join(" | ");
        }
        
        const expireTime = new Date(alert.expires).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById("details").innerHTML = `<b>EXPIRES: ${expireTime}</b> | ${hazardText || eventName.toUpperCase()}`;

        document.getElementById("banner").classList.add("visible");
        textGroup.classList.remove("text-hidden");

        cycleIndex++;
        setTimeout(showNextAlert, 10000); 
      }, 450);
    }

    fetchAlerts();
    setInterval(fetchAlerts, 60000);
  </script>
</body>
</html>
